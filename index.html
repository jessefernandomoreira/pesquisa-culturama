<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="shortcut icon" href="culturama-favico.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <title>Pesquisa Culturama</title>

</head>
<body>
    <main>
        <header>
            <img src="img/logo-culturama.png" alt="logo-culturama">
            <h1>Pesquisa de opnião</h1>
        </header>
        <section>
            <form action="sucesso.html" method="get">
                <!-- dados pessoais -->
                <fieldset>

                <legend>Dados Pessoais</legend>    
                
                <label for="name">Nome</label> <!-- coloca a indentificação do campo  -->
                <input id="name" type="text" name="userName" required > <!-- cria a caixa de dialogo do formulario e informa que é uma informação obrigatoria -->
                <br>
                <label for="age">Idade</label>
                <input id="age" type="number" name="userAge" min="12" max="100" required> <!--coloca um limite min e max de idade  -->
                <br>
                <label for="birthDate">Data de Nascimento </label>
                <input id="birthDate" type="date" name="userBirthDate"">
                <br>
                <label for="email">Email</label>
                <input id="email" type="email" name="userEmail" placeholder="@email.com" required > <!-- indica qual o requerimento dessa caixa -->
                <br>
                <label for="phoneNumber">Telefone</label>  
                <input id="phoneNumber" type="tel" name="userPhoneNumber" pattern="[0-9]{11}" placeholder="123456789" aria-describedby="phoneHelp"> <!-- indica qual n°/letras queremos usar e a quantidade desses caracteris -->
                <small id="phoneHelp">Preencha com 11 dígitos no formato: DDD + número sem espaços ou fífen.</small>
                <br>
                <label for="image">Upload de foto</label>
                <input id="image" type="file" accept="image/*" name="userImage">
                
                </fieldset> 

            
                <fieldset>
                <legend>Perfil</legend>

                <p>Gênero:</p>

                <input id="feminino" type="radio" name="userGender" value="Feminino">
                <label for="feminino">Feminino</label>
                
                <input id="masculino" type="radio" name="userGender" value="Masculino">
                <label for="masculino">Masculino</label>
                
                <input id="notInformed" type="radio" name="userGender" value="notInformed">
                <label for="notInformed">Prefiro não informa</label>
                <br>
                <label for="maritalStatus">Estado Civil</label>
                <select id="maritalStatus" name="userMaritalStatus">

                    <option value="">Selecione...</option>
                    <option value="casado">Casado</option>
                    <option value="Solteiro">Solteiro</option>
                    <option value="divorciado">Divorciado</option>
                    <option value="uniaoEstavel">União Estavel</option>
                </select>
                <br>
                <label for="state">Estado</label>
                <select id="state" name="userState" required>
                    <option value="">Selecione...</option>
                    <option value="acre">Acre</option>
                    <option value="alagoas">Alagoas</option>
                    <option value="amapa">Amapá</option>
                    <option value="amazonas">Amazonas</option>
                    <option value="bahia">Bahia</option>
                    <option value="ceara">Ceará</option>
                    <option value="distritoFederal">Distrito Federal</option>
                    <option value="espiritoSanto">Espirito Santo</option>
                    <option value="goias">Goiás</option>
                    <option value="maranhão">Maranhão</option>
                    <option value="matoGrossoDoSul">Mato Grosso do Sul</option>
                    <option value="matoGrosso">Mato Grosso</option>
                    <option value="minasGerais">Minas Gerais</option>
                    <option value="para">Pará</option>
                    <option value="paraiba">Paraíba</option>
                    <option value="parana">Paraná</option>
                    <option value="pernambuco">Pernambuco</option>
                    <option value="piaui">Piauí</option>
                    <option value="rioDeJaneiro">Rio de Janeiro</option>
                    <option value="rioGrandeDoNorte">Rio Grande do Norte</option>
                    <option value="rioGrandeDoSul">Rio Grande do Sul</option>
                    <option value="rondonia">Rondônia</option>
                    <option value="roraima">Roraima</option>
                    <option value="santaCatarina">Santa Catarina</option>
                    <option value="saoPaulo">São Paulo</option>
                    <option value="sergipe">Sergipe</option>
                    <option value="tocantins">Tocantins</option>

                </select>
                <br>
                <label for="city">Cidade</label>
                <input id="city" type="text" name="userCity">


                </fieldset>

                <!-- habitos -->
                <fieldset>
                    <legend>Hábitos</legend>

                     <p>Redes Sociais:</p>
                    <input id="instagram" type="checkbox" name="social" value="instagram">
                    <label for="instagram">Instagram</label>
                    <br>
                    <input id="facebook" type="checkbox" name="social" value="facebook">
                    <label for="facebook">Facebook</label>
                    <br>
                    <input id="linkedin" type="checkbox" name="social" value="linkedin">
                    <label for="linkedin">Linkedin</label>
                    <br>
                    <input id="x" type="checkbox" name="social" value="x">
                    <label for="x">X</label>
                    <br>


                    <label for="musicStyle">Estilo musical:</label>
                    <input list="styleTypes" id="musicStyle" type="text" name="userMusicStyle">
                    <datalist id="styleTypes">
                        <option value="Hip-Hop">
                        <option value="Rap">
                        <option value="Rock">                         
                    </datalist>
                    <br>

                    <label for="favoriteColor">Cor Favorita</label>
                    <input id="favoriteColor" type="color" name="userFavoriteColor">


                </fieldset>

                <fieldset>
                    <legend>Opnião</legend>

                    <p>O que você acha do nosso serviço?</p>

                    <input type="radio" name="userServiceOpinion" id="otimo" value="otimo">
                    <label for="otimo">Ótimo</label>

                    <input type="radio" name="userServiceOpinion" id="bom" value="bom">
                    <label for="bom">Bom</label>

                    <input type="radio" name="userServiceOpinion" id="regular" value="regular">
                    <label for="regular">Regular</label>

                    <input type="radio" name="userServiceOpinion" id="ruim" value="ruim">
                    <label for="ruim">Ruim</label>
                    <br>

                    <label for="text" >Deixe sua opnião/sujestão:</label>
                    <textarea name="opnion" id="text" placeholder="Digite aqui a sua opnião..."></textarea>

                </fieldset>

                <fieldset>
                    <legend>Confirmações</legend>

                    <input type="checkbox" name="userLgpd" id="userLgpdTerm" value="accepted" required>
                    <label for="userLgpdTerm">Eu aceito participar da pesquisa.</label>
                    <br>
                    <input type="checkbox" name="userGetResult" id="getResult" value="accepted">
                    <label for="getResult">Desejo receber o resultado por email.</label>
                    <br>
                </fieldset>

                <button type="submit">Enviar</button> <!-- cria o botão que envia a informção do formulario -->
                <button type="reset">limpar</button> 
                 </form>
        </section>
    </main>    
</body>
</html>
