<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa Culturama</title>

</head>
<body>
    <header>
        <h1>Pesquisa Online</h1>
    </header>
    <section>
        <form action="" method="get">
            <!-- dados pessoais -->
            <fieldset>
                   
            <legend>Dados Pessoais</legend>    
              
            <label for="userName">Nome</label> <!-- coloca a indentificação do campo  -->
            <input type="text" name="userName" required> <!-- cria a caixa de dialogo do formulario e informa que é uma informação obrigatoria -->
            <br>
            <label for="userAge">Idade</label>
            <input type="number" name="userAge" min="12" max="100" required> <!--coloca um limite min e max de idade  -->
            <br>
            <label for="birthDate">Data de Nascimento </label>
            <input type="date" name="birthDate"">
            <br>
            <label for="userEmail">Email</label>
            <input type="email" name="userEmail" placeholder="@email.com" required> <!-- indica qual o requerimento dessa caixa -->
            <br>
            <label for="userPhoneNumber">Telefone</label>  
            <input type="tel" name="userPhoneNumber" pattern="[0-9]{11}" placeholder="123456789"> <!-- indica qual n°/letras queremos usar e a quantidade desses caracteris -->
            <br>
            <label for="userImage">Upload de foto</label>
            <input type="file" accept="image/*" name="userImage">
            
            </fieldset> 
                       
       
            <fieldset>
            <legend>Perfil</legend>

            <p>Gênero:</p>
            <input type="radio" name="userGender" value="Feminino">
            <label for="userGender">Feminino</label>
            
            <input type="radio" name="userGender" value="Masculino">
            <label for="userGender">Masculino</label>
            
            <input type="radio" name="userGender" value="notInformed">
            <label for="userGender">Prefiro não informa</label>
            <br>
            <p>Estado Civil:</p>
            <select name="maritalStatus">
                
                <option value="notInformed">Selecione...</option>
                <option value="casado">Casado</option>
                <option value="Solteiro">Solteiro</option>
                <option value="divorciado">Divorciado</option>
                <option value="uniaoEstavel">União Estavel</option>
            </select>


            </fieldset>

            <button type="submit">Enviar</button> <!-- cria o botão que envia a informção do formulario -->

             </form>
    </section>
</body>
</html>
